name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/svp-translator" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest

      - name: Write .env to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /root/svp-translator
            cat > /root/svp-translator/.env <<'EOF'
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            SOURCE_CHANNEL_ID=${{ secrets.SOURCE_CHANNEL_ID }}
            TARGET_CHANNEL_ID=${{ secrets.TARGET_CHANNEL_ID }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            MODEL=${{ vars.MODEL }}
            CHUNK_SIZE_WORDS=${{ vars.CHUNK_SIZE_WORDS }}
            USE_BATCH_API=${{ vars.USE_BATCH_API }}
            LOG_LEVEL=${{ vars.LOG_LEVEL }}
            EOF

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE }}:latest
            docker stop svp-translator || true
            docker rm svp-translator || true
            docker run -d \
              --name svp-translator \
              --restart unless-stopped \
              --env-file /root/svp-translator/.env \
              ${{ env.IMAGE }}:latest
            docker image prune -f
